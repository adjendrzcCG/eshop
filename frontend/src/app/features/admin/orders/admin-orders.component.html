<div class="page-container">
  <div class="admin-header">
    <h1 class="page-title">Orders Management</h1>
    <span class="total-count">{{ totalOrders }} orders total</span>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-container">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <!-- Orders Table -->
  <mat-card *ngIf="!loading">
    <mat-card-content>
      <div class="table-responsive">
        <table mat-table [dataSource]="orders" class="orders-table">

          <ng-container matColumnDef="orderNumber">
            <th mat-header-cell *matHeaderCellDef>Order #</th>
            <td mat-cell *matCellDef="let order">
              <strong>{{ order.orderNumber }}</strong>
            </td>
          </ng-container>

          <ng-container matColumnDef="user">
            <th mat-header-cell *matHeaderCellDef>Customer</th>
            <td mat-cell *matCellDef="let order">{{ order.userEmail }}</td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let order">
              <mat-select [value]="order.status"
                          (selectionChange)="updateStatus(order.id, $event.value)"
                          class="status-select">
                <mat-option *ngFor="let s of orderStatuses" [value]="s">{{ s }}</mat-option>
              </mat-select>
            </td>
          </ng-container>

          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef>Total</th>
            <td mat-cell *matCellDef="let order">
              <strong>£{{ order.totalAmount | number:'1.2-2' }}</strong>
            </td>
          </ng-container>

          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Date</th>
            <td mat-cell *matCellDef="let order">{{ order.createdAt | date:'d MMM yyyy, HH:mm' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Details</th>
            <td mat-cell *matCellDef="let order">
              <span class="payment-badge"
                    [class.paid]="order.paymentStatus === 'PAID'"
                    [class.pending]="order.paymentStatus === 'PENDING'"
                    [class.failed]="order.paymentStatus === 'FAILED'">
                {{ order.paymentStatus }}
              </span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <div *ngIf="orders.length === 0" class="no-data">
        No orders found.
      </div>
    </mat-card-content>
  </mat-card>
</div>
