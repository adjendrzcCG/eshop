spring.application.name=eshop-backend

# Server
server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eshop}
spring.datasource.username=${DB_USERNAME:eshop}
spring.datasource.password=${DB_PASSWORD:eshop_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:eshop-jwt-secret-key-should-be-at-least-256-bits-long-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# Logging
logging.level.com.eshop=INFO
logging.level.org.springframework.security=WARN

# Cache
spring.cache.type=simple

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# SpringFox / Swagger
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
