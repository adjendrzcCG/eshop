version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eshop-postgres
    environment:
      POSTGRES_DB: eshop
      POSTGRES_USER: eshop
      POSTGRES_PASSWORD: eshop_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eshop -d eshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eshop-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/eshop
      DB_USERNAME: eshop
      DB_PASSWORD: eshop_secret
      JWT_SECRET: modelshop-jwt-secret-key-must-be-at-least-256-bits-long-for-production
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-network
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eshop-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - eshop-network

volumes:
  postgres_data:
  uploads_data:

networks:
  eshop-network:
    driver: bridge
